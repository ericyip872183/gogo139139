version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: panlei-mysql
    environment:
      MYSQL_ROOT_PASSWORD: panlei_root_2024
      MYSQL_DATABASE: panlei_dev
      MYSQL_USER: panlei
      MYSQL_PASSWORD: panlei_dev_2024
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: panlei-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --requirepass panlei_redis_2024
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
